name: Minute Test Commit Workflow

on:
  schedule:
    # Runs every minute (for testing)
    - cron: "* * * * *"

jobs:
  commit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Step with email 23f1000179@ds.study.iitm.ac.in
        run: |
          echo "Adding a test commit every minute"

      - name: Make test commit
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S")
          # Create the file if it doesn't exist
          touch minute_test.txt
          echo "Commit at $DATE" >> minute_test.txt
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add minute_test.txt
          git commit -m "Test commit $DATE" || echo "No changes to commit"
          git push
